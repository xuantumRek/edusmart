apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edusmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 590144423099.dkr.ecr.ap-southeast-2.amazonaws.com/edusmart-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"