apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: edusmart
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 590144423099.dkr.ecr.ap-southeast-2.amazonaws.com/edusmart-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_URL
              value: "http://backend-service.edusmart.svc.cluster.local:8000"